<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In - Wallet Nakama</title>
  <link rel="stylesheet" href="shared.css" />
  <link rel="stylesheet" href="auth.css" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
</head>
<body>
  <div id="toast-container" aria-live="polite"></div>

  <div id="auth-screen" class="auth-screen">
    <div class="auth-card">
      <div class="auth-logo">
        <div class="logo-icon">💼</div>
        <span class="logo-text">Wallet Nakama</span>
      </div>

      <div class="auth-tabs">
        <button class="auth-tab active" data-tab="signin">Sign In</button>
        <button class="auth-tab" data-tab="signup">Sign Up</button>
      </div>

      <form id="signin-form" class="auth-form active" novalidate>
        <div class="form-group">
          <label for="signin-email">Email Address</label>
          <input type="email" id="signin-email" placeholder="you@example.com" autocomplete="email" />
          <span class="field-error" id="signin-email-err"></span>
        </div>
        <div class="form-group">
          <label for="signin-password">Password</label>
          <input type="password" id="signin-password" placeholder="Your password" autocomplete="current-password" />
          <span class="field-error" id="signin-pw-err"></span>
        </div>
        <div class="form-msg" id="signin-msg"></div>
        <button type="submit" class="btn-primary btn-full">Sign In</button>
        <p class="auth-switch">Don't have an account? <a href="#" data-switch="signup">Sign Up</a></p>
      </form>

      <form id="signup-form" class="auth-form" novalidate>
        <div class="form-row">
          <div class="form-group">
            <label for="signup-first">First Name</label>
            <input type="text" id="signup-first" placeholder="John" />
            <span class="field-error" id="signup-first-err"></span>
          </div>
          <div class="form-group">
            <label for="signup-last">Last Name</label>
            <input type="text" id="signup-last" placeholder="Doe" />
            <span class="field-error" id="signup-last-err"></span>
          </div>
        </div>
        <div class="form-group">
          <label for="signup-email">Email Address</label>
          <input type="email" id="signup-email" placeholder="you@example.com" autocomplete="email" />
          <span class="field-error" id="signup-email-err"></span>
        </div>
        <div class="form-group">
          <label for="signup-password">Password</label>
          <input type="password" id="signup-password" placeholder="Create a password" autocomplete="new-password" />
          <span class="field-error" id="signup-pw-err"></span>
        </div>
        <div class="form-group">
          <label for="signup-confirm">Confirm Password</label>
          <input type="password" id="signup-confirm" placeholder="Repeat your password" autocomplete="new-password" />
          <span class="field-error" id="signup-confirm-err"></span>
        </div>
        <div class="form-msg" id="signup-msg"></div>
        <button type="submit" class="btn-primary btn-full">Create Account</button>
        <p class="auth-switch">Already have an account? <a href="#" data-switch="signin">Sign In</a></p>
      </form>
    </div>
  </div>

  <script src="shared.js"></script>
  <script src="auth.js"></script>
</body>
</html>
